<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>IP Bilgi Paneli</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding-top:100px;
}

h1{
font-size:40px;
margin-bottom:40px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{color:#38bdf8;}
to{color:#22c55e;}
}

.box{
background:#1e293b;
width:350px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #38bdf8;
animation: float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.info{
margin:15px 0;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#38bdf8;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<h1>IP Bilgi Paneli</h1>

<div class="box">

<div class="info">IP: <span id="ip">Yükleniyor...</span></div>
<div class="info">Koordinat: <span id="coord">Yükleniyor...</span></div>
<div class="info">İnternet Sağlayıcısı: <span id="isp">Yükleniyor...</span></div>
<div class="info">Ülke: <span id="country">Yükleniyor...</span></div>

<button onclick="getIP()">Bilgileri Yenile</button>

</div>

<script>

async function getIP(){

let response = await fetch("https://ipapi.co/json/");
let data = await response.json();

document.getElementById("ip").innerText = data.ip;
document.getElementById("coord").innerText = data.latitude + " , " + data.longitude;
document.getElementById("isp").innerText = data.org;
document.getElementById("country").innerText = data.country_name;

}

getIP();

</script>

</body>
</html>
