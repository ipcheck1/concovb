<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Valorant Premade</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#2b0040,#7b2cbf);
color:white;
overflow-x:hidden;
}

.container{
max-width:800px;
margin:auto;
padding:30px;
animation:fade 1s;
}

.card{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px #a855f7;
animation:slideUp 0.5s;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#3b0764;
color:white;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#a855f7;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#c084fc;
}

.hidden{
display:none;
}

.post{
background:#2e1065;
padding:15px;
border-radius:10px;
margin-top:10px;
animation:fade 0.6s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{transform:translateY(20px);opacity:0}
to{transform:translateY(0);opacity:1}
}

</style>

</head>

<body>

<div class="container">

<h1>Valorant Premade</h1>

<div id="auth" class="card">

<h3>Kayıt / Giriş</h3>

<input id="user" placeholder="Kullanıcı adı">
<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş / Kayıt</button>

<p id="msg"></p>

</div>

<div id="panel" class="hidden">

<div class="card">

<h3>Premade Oluştur</h3>

<label>Mod</label>

<select id="mode">
<option>Derecesiz</option>
<option>Rekabete Dayalı</option>
</select>

<label>Rank</label>

<select id="rank">
<option>Demir</option>
<option>Bronz</option>
<option>Gümüş</option>
<option>Altın</option>
<option>Platin</option>
<option>Yücelik</option>
<option>Ölümsüzlük</option>
<option>Radyant</option>
</select>

<label>Grup Kodu</label>

<input id="code" placeholder="VALO123">

<button onclick="postPremade()">Paylaş</button>

</div>

<div class="card">

<h3>Aktif Premadeler</h3>

<div id="posts"></div>

</div>

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(!u || !p){
msg("Bilgileri gir")
return
}

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

document.getElementById("auth").style.display="none"
document.getElementById("panel").classList.remove("hidden")

loadPosts()

}

function msg(t){
document.getElementById("msg").innerText=t
}

function postPremade(){

let mode=document.getElementById("mode").value
let rank=document.getElementById("rank").value
let code=document.getElementById("code").value
let user=localStorage.getItem("user")

let time=new Date().toLocaleTimeString()

let posts=JSON.parse(localStorage.getItem("posts") || "[]")

posts.unshift({
user:user,
mode:mode,
rank:rank,
code:code,
time:time
})

localStorage.setItem("posts",JSON.stringify(posts))

loadPosts()

}

function loadPosts(){

let posts=JSON.parse(localStorage.getItem("posts") || "[]")

let html=""

posts.forEach(p=>{

html+=`
<div class="post">
<b>${p.user}</b><br>
Mod: ${p.mode}<br>
Rank: ${p.rank}<br>
Grup Kodu: <b>${p.code}</b><br>
⏱ ${p.time}
</div>
`

})

document.getElementById("posts").innerHTML=html

}

if(localStorage.getItem("user")){
document.getElementById("auth").style.display="none"
document.getElementById("panel").classList.remove("hidden")
loadPosts()
}

</script>

</body>
</html>
